<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Gamebook AI — Create AI-Powered Interactive Stories</title>
    <meta name="description" content="Create, read, and share AI-generated interactive gamebooks with branching stories, vivid illustrations, and memorable characters." />
    <meta name="keywords" content="gamebook, interactive fiction, AI stories, branching narrative, choose your own adventure, illustrated stories, AI book generator, fairy tale, comic book" />
    <meta property="og:title" content="Gamebook AI — Create AI-Powered Interactive Stories" />
    <meta property="og:description" content="Create, read, and share AI-generated interactive gamebooks with branching stories, vivid illustrations, and memorable characters." />
    <meta property="og:type" content="website" />
    <link id="seo-canonical" rel="canonical" href="https://example.com/" />
    <script id="seo-json-ld" type="application/ld+json"></script>
    <script type="module">
      const publicAppUrl = (import.meta.env.VITE_PUBLIC_APP_URL || window.location.origin || "").replace(/\/$/, "");

      if (publicAppUrl) {
        const canonical = document.getElementById("seo-canonical");
        if (canonical) {
          canonical.setAttribute("href", `${publicAppUrl}/`);
        }

        const ld = document.getElementById("seo-json-ld");
        if (ld) {
          ld.textContent = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "WebSite",
            name: "Gamebook AI",
            url: publicAppUrl,
            description: "Create, read, and share AI-generated interactive gamebooks with branching stories, vivid illustrations, and memorable characters.",
            potentialAction: {
              "@type": "SearchAction",
              target: {
                "@type": "EntryPoint",
                urlTemplate: `${publicAppUrl}/store?q={search_term_string}`,
              },
              "query-input": "required name=search_term_string",
            },
          });
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const endpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT;
      const websiteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;

      if (endpoint && websiteId) {
        const script = document.createElement("script");
        script.defer = true;
        script.src = `${endpoint.replace(/\/$/, "")}/umami`;
        script.setAttribute("data-website-id", websiteId);
        document.body.appendChild(script);
      }
    </script>
  </body>

</html>
